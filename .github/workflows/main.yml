name: ROS2 CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f .devcontainer/Dockerfile \
            -t ros2-ci .

      - name: Build workspace
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/ws \
            ros2-ci \
            bash -c "
              cd /ws &&
              source /opt/ros/jazzy/setup.bash &&
              colcon build
            "
