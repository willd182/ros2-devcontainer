jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f .devcontainer/Dockerfile -t ros2-ci .

      - name: Build workspace
        run: |
          docker run --rm -v ${{ github.workspace }}:/ws ros2-ci bash -c "
            source /opt/ros/jazzy/setup.bash &&
            cd /ws &&
            colcon build
          "

      - name: Test workspace
        run: |
          docker run --rm -v ${{ github.workspace }}:/ws ros2-ci bash -c "
            source /opt/ros/jazzy/setup.bash &&
            cd /ws &&
            source install/setup.bash &&
            colcon test &&
            colcon test-result --verbose
          "
