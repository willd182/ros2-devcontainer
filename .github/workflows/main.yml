name: ROS2 CI
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f .devcontainer/Dockerfile \
            -t ros2-ci .

      - name: Start container
        run: |
          docker run -d \
            --name ros2-ci-container \
            -v ${{ github.workspace }}:/ws \
            ros2-ci \
            tail -f /dev/null

      - name: Build workspace
        run: |
          docker exec ros2-ci-container bash -c "
            cd /ws &&
            source /opt/ros/jazzy/setup.bash &&
            colcon build
          "

      - name: Run tests
        run: |
          docker exec ros2-ci-container bash -c "
            cd /ws &&
            source /opt/ros/jazzy/setup.bash &&
            colcon test --event-handlers console_direct+
          "

      - name: Show test results
        if: always()
        continue-on-error: true   # TODO: remove once all tests are passing, to enforce pass/fail
        run: |
          docker exec ros2-ci-container bash -c "
            cd /ws &&
            source /opt/ros/jazzy/setup.bash &&
            colcon test-result --verbose
          "

      - name: Stop container
        if: always()
        run: docker rm -f ros2-ci-container
